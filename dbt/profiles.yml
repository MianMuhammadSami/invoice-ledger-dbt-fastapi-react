invoice_ledger:
  target: prod
  outputs:
    prod:
      type: postgres
      host: "{{ env_var('DBT_HOST', 'localhost') }}"
      port: "{{ env_var('DBT_PORT', '5432') | int }}"
      user: "{{ env_var('DBT_USER', 'ledger') }}"
      password: "{{ env_var('DBT_PASSWORD', 'ledger_pass') }}"
      dbname: "{{ env_var('DBT_DB', 'invoice_ledger') }}"
      schema: raw
      threads: 4
